    {% extends 'base.html' %}

    {% block title %}Detail Buku{% endblock %}

    {% block content %}
        <h1 class="text-3xl font-bold text-slate-900">
            Edit Buku
        </h1>

        <p class="mt-2 text-slate-600">
            Berikut adalah informasi detail mengenai buku yang dipilih.</p>    

        <div class="grid gap-4 md:grid-cols-2">
            <!-- disini area per item nya -->

            <form method="POST">
        {% csrf_token %}

        <label class="block text-sm font-medium text-slate-700 mb-1">Judul</label>
        <input
            type="text"
            name="judul"
            value="{% if buku %}{{ buku.judul }}{% endif %}"
            type="text" name="judul" value="" required
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Pengarang</label>
        <input
            type="text"
            name="pengarang"
            value="{% if buku %}{{ buku.pengarang }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>
        <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
        <input
            type="text"
            name="kategori"
            value="{% if buku %}{{ buku.kategori }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Penerbit</label>
        <input
            type="text"
            name="penerbit"
            value="{% if buku %}{{ buku.penerbit }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Terbit</label>
        <input
            type="date"
            name="tahun_terbit"
            value="{% if buku %}{{ buku.tahun_terbit|date:'Y-m-d' }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Rak</label>
        <input
            type="text"
            name="rak"
            value="{% if buku %}{{ buku.rak }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
        <input
            type="number"
            name="stok"
            value="{% if buku %}{{ buku.stok }}{% endif %}"
            type="number" name="stok" value="" required
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>

        <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi</label>
        <input
            type="text"
            name="deskripsi"
            value="{% if buku %}{{ buku.deskripsi }}{% endif %}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >

        <br><br>


        <br><br>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
                Simpan
            </button>

            <a href="{% url 'buku_list' %}"
            class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
                Batal
            </a>
        </div>

    </form>
        </div>
    {% endblock %}
