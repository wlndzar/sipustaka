{% extends "base.html" %} {% block title %}Hapus Siswa{% endblock %}

{% block content %}
<div class="mb-6">
  <p class="text-sm text-slate-500">Konfirmasi hapus data siswa.</p>
  <h1 class="text-2xl font-semibold text-slate-800">Hapus Siswa</h1>
</div>

<div class="bg-white rounded-2xl border border-slate-200 p-6 max-w-lg">
  <p class="text-slate-700 mb-2">
    Apakah kamu yakin ingin menghapus siswa berikut?
  </p>
  <div class="bg-slate-50 rounded-xl p-4 mb-6 text-sm">
    <p>
      <span class="text-slate-500">Nama:</span>
      <strong>{{ siswa.nama }}</strong>
    </p>
    <p><span class="text-slate-500">Kelas:</span> {{ siswa.kelas }}</p>
    <p><span class="text-slate-500">NIS:</span> {{ siswa.nis }}</p>
  </div>
  <form method="POST">
    {% csrf_token %}
    <div class="flex gap-2">
      <a
        href="{% url 'siswa_list' %}"
        class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 text-slate-700 text-sm"
        >Batal</a
      >
      <button
        type="submit"
        class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm"
      >
        Ya, Hapus
      </button>
    </div>
  </form>
</div>
{% endblock %}
